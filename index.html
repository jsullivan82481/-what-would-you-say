<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What Would You Say?</title>
<style>
body{margin:0;font-family:Arial Rounded MT Bold,Arial,sans-serif;background:linear-gradient(135deg,#7bdcff,#ffe66d,#ff9bd8);text-align:center;color:#222;overflow-x:hidden}
.app{padding:22px;max-width:850px;margin:auto}
h1{font-size:38px;text-shadow:2px 2px #fff;margin-bottom:5px}
h2{font-size:22px;margin-top:0}
#pressBtn{font-size:38px;background:linear-gradient(#ffb347,#ff7a00);color:white;border:6px solid #8a3a00;border-radius:50%;width:210px;height:210px;box-shadow:0 14px 0 #8a3a00,0 20px 25px rgba(0,0,0,.35);font-weight:bold;margin:18px;animation:pulse 1.4s infinite}
#pressBtn:active{transform:translateY(12px);box-shadow:0 2px 0 #8a3a00,0 8px 15px rgba(0,0,0,.25)}
.card{background:#fff;border:6px solid #222;border-radius:32px;padding:24px;margin:20px 0;box-shadow:0 10px 0 rgba(0,0,0,.25)}
#emoji{font-size:95px;animation:bounce 1s infinite}
#scene{font-size:30px;font-weight:bold;line-height:1.15}
#question{font-size:34px;color:#d0006f;margin-top:18px}
.answer{display:block;width:100%;font-size:25px;margin:12px 0;padding:18px;border:5px solid #222;border-radius:24px;background:white;font-weight:bold;box-shadow:0 6px 0 #222}
.answer:active{transform:translateY(5px);box-shadow:0 1px 0 #222}
#reaction{font-size:34px;font-weight:bold;min-height:45px}
.shake{animation:shake .35s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}}
</style>
</head>

<body>
<div class="app">
<h1>🎲 What Would You Say?</h1>
<h2>Tucker's Silly Machine</h2>

<button id="pressBtn" onclick="makeScene()">PRESS<br>ME</button>

<div class="card">
<div id="emoji">🟠</div>
<div id="scene">Press the big orange button.</div>
<div id="question"></div>
</div>

<div id="answers"></div>
<div id="reaction"></div>
</div>

<script>
const characters=[
["🦖","T-Rex"],["👽","an alien"],["🐀","Rick Ratman"],["🤖","a spooky animatronic"],
["💩","King Poopy"],["🤢","a giant booger"],["🐶","Sully"],["🦭","Neil the Seal"],
["⭐","a tiny Jedi"],["🚜","a monster truck"],["🎃","a pumpkin monster"]
];

const places=[
"inside Spirit Halloween","at Lowe's in the Halloween aisle","at Home Depot with the skeletons",
"on the Death Star","on the moon","inside a spaceship","in a pumpkin patch",
"at a dinosaur dance party","in Booger Town","at a poop parade"
];

const actions=[
"slips on a banana peel 🍌","does the Cotton Eye Joe dance 🤠",
"does the Cha Cha Slide 💃","falls into marshmallows",
"gets chased by a giant booger 🤢","blows a raspberry into space 😝",
"rides a toilet rocket 🚽🚀","uses a lightsaber on a taco ⭐🌮",
"sneezes so hard his hat flies off 🤧","gets toilet paper stuck to his shoe 🧻",
"crashes into a pumpkin and yells BOO 🎃","rides a monster truck over spaghetti 🚜🍝"
];

const answerSets=[
["😂 Again!","🍌 Watch out!","💃 Dance!","🤫 Nothing"],
["🤢 Boogers!","⭐ Use the Force!","🌮 More tacos!","🤫 Nothing"],
["🤣 Funny!","🏃 Run away!","💩 Poop crown!","🤫 Nothing"],
["🎃 Boo!","🚜 Monster truck!","🧻 Toilet paper!","🤫 Nothing"]
];

function pick(a){return a[Math.floor(Math.random()*a.length)]}

function say(t){
 if("speechSynthesis" in window){
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(t);
  u.rate=.85;
  u.pitch=1.15;
  speechSynthesis.speak(u);
 }
}

function raspberry(){
 let sounds=["Pbbbbbbt!","Bllllllrt!","Pffffft!"];
 say(pick(sounds));
}

function makeScene(){
 raspberry();

 setTimeout(()=>{
  const c=pick(characters), place=pick(places), action=pick(actions);
  const text=c[1]+" "+place+" and "+action+".";
  document.getElementById("emoji").textContent=c[0];
  document.getElementById("scene").textContent=text;
  document.getElementById("question").textContent="...aaaand what would you say?";
  document.getElementById("reaction").textContent="";

  const answers=pick(answerSets).sort(()=>Math.random()-.5);
  document.getElementById("answers").innerHTML=answers.map(a=>
   `<button class="answer" onclick="reply('${a}')">${a}</button>`
  ).join("");

  setTimeout(()=>say("And what would you say?"),500);
 },700);
}

function reply(a){
 document.body.classList.remove("shake");
 void document.body.offsetWidth;
 document.body.classList.add("shake");

 let spoken=a.replace(/[^\w\s!]/g,"").trim();

 if(a.includes("Nothing")){
  document.getElementById("reaction").textContent="😂 YOU CAN'T SAY NOTHING!!";
  say("You can't say nothing!");
 }else{
  document.getElementById("reaction").textContent="🎉 "+a;
  say(spoken);
 }
}
</script>
</body>
</html>
