<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>What Would You Say?</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <h1>🎲 What Would You Say?</h1>

    <button id="bigButton" class="arcade" aria-label="Press the button"></button>

    <div class="prompt">Press the button!</div>

    <div class="card" id="card">
      <div id="mainEmoji">🟠</div>
      <div id="scene">Ready?</div>
      <div id="question" role="button" tabindex="0"></div>
    </div>

    <div id="answers"></div>
    <div id="reaction"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
